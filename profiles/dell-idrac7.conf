# =============================================================================
# Vendor Profile: Dell iDRAC7
# Compatible hardware: PowerEdge R520, R620, R720, R820
# Status: TESTED (R520)
# =============================================================================

PROFILE_NAME="Dell iDRAC7"
PROFILE_IPMITOOL_INTERFACE="open"   # in-band via /dev/ipmi0

cmd_disable_auto() {
    ipmitool raw 0x30 0x30 0x01 0x00
}

cmd_enable_auto() {
    ipmitool raw 0x30 0x30 0x01 0x01
}

# $1 = speed percentage (integer, e.g. 20)
cmd_set_speed() {
    local hex
    hex=$(percent_to_hex "$1")
    ipmitool raw 0x30 0x30 0x02 0xff "$hex"
}
