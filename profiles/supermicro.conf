# =============================================================================
# Vendor Profile: Supermicro IPMI 2.0
# Compatible hardware: X9, X10, X11 motherboard series
# Status: UNTESTED — community contributions welcome
# Note: Supermicro uses a different fan mode system (Standard/Optimal/Heavy IO/
#       Full Speed). Zone-based control is available on some boards.
#       Raw codes below are for Full Speed override and manual zone control.
# =============================================================================

PROFILE_NAME="Supermicro IPMI 2.0"
PROFILE_IPMITOOL_INTERFACE="open"

cmd_disable_auto() {
    # Set fan mode to "Full Speed" (0x01) to take manual control
    # Other modes: 0x00=Standard, 0x02=Optimal, 0x04=Heavy IO
    ipmitool raw 0x30 0x45 0x01 0x01
}

cmd_enable_auto() {
    # Restore "Optimal" fan mode
    ipmitool raw 0x30 0x45 0x01 0x02
}

# $1 = speed percentage (integer, e.g. 20)
# Supermicro uses zone-based control: 0x00 = CPU zone, 0x01 = peripheral zone
cmd_set_speed() {
    local hex
    hex=$(percent_to_hex "$1")
    ipmitool raw 0x30 0x70 0x66 0x01 0x00 "$hex"   # CPU zone
    ipmitool raw 0x30 0x70 0x66 0x01 0x01 "$hex"   # Peripheral zone
}
