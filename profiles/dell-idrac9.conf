# =============================================================================
# Vendor Profile: Dell iDRAC9
# Compatible hardware: PowerEdge R640, R740, R840, R940
# Status: UNTESTED — community contributions welcome
# Note: iDRAC9 behaviour may differ; some units ignore manual speed below
#       a thermal floor. Third-party PCIe cards may cause iDRAC to override
#       manual control. Test carefully.
# =============================================================================

PROFILE_NAME="Dell iDRAC9"
PROFILE_IPMITOOL_INTERFACE="open"

cmd_disable_auto() {
    ipmitool raw 0x30 0x30 0x01 0x00
}

cmd_enable_auto() {
    ipmitool raw 0x30 0x30 0x01 0x01
}

# $1 = speed percentage (integer, e.g. 20)
cmd_set_speed() {
    local hex
    hex=$(percent_to_hex "$1")
    ipmitool raw 0x30 0x30 0x02 0xff "$hex"
}
