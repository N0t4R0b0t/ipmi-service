# =============================================================================
# IPMI Fan Control — Configuration
# =============================================================================

# --- Vendor Profile -----------------------------------------------------------
# Which profile to load from the profiles/ directory (without .conf extension)
# Available (tested):   dell-idrac7
# Available (untested): dell-idrac6, dell-idrac9, supermicro
PROFILE=dell-idrac7

# --- Safety -------------------------------------------------------------------

# If temperature meets or exceeds this value, manual control is disabled and
# vendor auto control is restored immediately.
TEMP_CRITICAL=75

# If temperature sensors cannot be read, fall back to vendor auto control.
FALLBACK_ON_READ_ERROR=true

# --- Temperature / Speed Tiers ------------------------------------------------
# Evaluated from hottest to coolest — first match wins.
# Add or remove tiers freely; they must be numbered sequentially from 1.

TIER_1_TEMP=65
TIER_1_SPEED=50

TIER_2_TEMP=55
TIER_2_SPEED=40

TIER_3_TEMP=45
TIER_3_SPEED=30

# Fan speed when temperature is below all thresholds
DEFAULT_SPEED=20

# --- Polling ------------------------------------------------------------------

# How often the systemd timer polls (systemd time format)
POLL_INTERVAL=2min

# Delay after boot before first run
BOOT_DELAY=30s

# --- Logging ------------------------------------------------------------------

LOGFILE=/var/log/fan-control.log

# Maximum log size in KB before rotation
LOG_MAX_KB=1024
